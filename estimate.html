<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Estimate | Semper Fi Removal</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <main class="estimate-page">
    <section class="page-hero compact">
      <div class="container">
        <p class="eyebrow">Sergeant’s Got Your Six™</p>
        <h1>Request Your Free Estimate</h1>
        <p class="lead">Send us the details and photos of what needs removed. We’ll review it and contact you with the next step.</p>
      </div>
    </section>

    <section class="section">
      <div class="container form-shell">
        <form id="estimateForm" class="estimate-form">
          <div class="form-grid">
            <label>Full Name *<input name="name" required /></label>
            <label>Phone *<input name="phone" type="tel" required /></label>
            <label>Email<input name="email" type="email" /></label>
            <label>Street Address<input name="address" /></label>
            <label>City *<input name="city" required /></label>
            <label>ZIP Code<input name="zip" /></label>

            <label>Service Needed *
              <select name="service" required>
                <option value="">Choose one</option>
                <option>Furniture Removal</option>
                <option>Appliance Removal</option>
                <option>Garage Cleanout</option>
                <option>Estate Cleanout</option>
                <option>Property Cleanout</option>
                <option>Yard Debris</option>
                <option>Construction Debris</option>
                <option>Hot Tub Removal</option>
                <option>Shed Removal</option>
                <option>Other</option>
              </select>
            </label>

            <label>Approximate Load Size
              <select name="loadSize">
                <option value="">Choose one</option>
                <option>Single Item</option>
                <option>Minimum Load</option>
                <option>1/4 Load</option>
                <option>1/2 Load</option>
                <option>3/4 Load</option>
                <option>Full Load</option>
                <option>Multiple Loads</option>
                <option>Not Sure</option>
              </select>
            </label>

            <label>Preferred Date<input name="preferredDate" type="date" /></label>

            <label>Same-Day Service?
              <select name="sameDay"><option>No</option><option>Yes</option></select>
            </label>

            <label>Stairs or Difficult Access?
              <select name="access"><option>No</option><option>Yes</option><option>Not Sure</option></select>
            </label>

            <label>Junk Location
              <select name="junkLocation">
                <option>Outside / Curbside</option>
                <option>Inside Home</option>
                <option>Garage</option>
                <option>Basement</option>
                <option>Attic</option>
                <option>Business / Commercial</option>
                <option>Other</option>
              </select>
            </label>
          </div>

          <label>Notes / Description *
            <textarea name="notes" rows="6" required placeholder="Tell us what needs removed, how much there is, and any access details."></textarea>
          </label>

          <label>Photo Link
            <input name="photoLink" placeholder="Paste Google Drive/iCloud photo link if available" />
          </label>

          <button class="btn btn-red" type="submit">Request My Free Estimate →</button>
          <p id="formMessage" class="form-message"></p>
        </form>
      </div>
    </section>
  </main>

  <script src="assets/js/estimate.js"></script>
</body>
</html>
